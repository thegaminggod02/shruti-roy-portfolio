<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="404 - Page Not Found. You have drifted away from the Nexus grid.">
    <title>404: Lost in the Nexus | Shruti Roy</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS (Reuse layout system) -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 2rem;
        }
        .error-card {
            max-width: 550px;
            padding: 3.5rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.05em;
        }
        .error-title {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--text-color);
        }
        .error-desc {
            color: var(--subtext-color);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .error-btn {
            padding: 0.9rem 2rem;
        }
    </style>
</head>
<body class="dark-theme">

    <!-- Background Grid Effect -->
    <div class="bg-grid-overlay"></div>

    <main class="error-container">
        <div class="error-card glass">
            <div class="error-code">404</div>
            <h1 class="error-title">Grid Link Terminated</h1>
            <p class="error-desc">
                The node you are looking for does not exist on this server, or has been classified. You have drifted outside the Shruti Roy AI Nexus grid. Let's redirect you back to primary sectors.
            </p>
            <a href="index.html" class="btn btn-primary error-btn">
                <i class="fa-solid fa-arrow-left icon-left"></i>Return to Nexus
            </a>
        </div>
    </main>

</body>
</html>
